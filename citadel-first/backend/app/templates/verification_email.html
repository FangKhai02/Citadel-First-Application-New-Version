<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Your Email — Citadel</title>
<style>
  body { margin: 0; padding: 0; background-color: #080E1A; font-family: 'Segoe UI', Arial, sans-serif; }
  .outer { width: 100%; padding: 48px 0; background-color: #080E1A; }
  .container { max-width: 520px; margin: 0 auto; background-color: #0F172A; border-radius: 20px; border: 1px solid rgba(41,171,226,0.15); overflow: hidden; }
  .logo-area { padding: 40px 40px 0; text-align: center; }
  .logo-area img { width: 72px; height: 72px; }
  .header { padding: 20px 40px 0; text-align: center; }
  .header h1 { color: #E2E8F0; font-size: 26px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; }
  .header p { color: #94A3B8; font-size: 15px; line-height: 1.7; margin: 0; }
  .body { padding: 32px 40px; text-align: center; }
  .btn { display: inline-block; padding: 16px 48px; background: linear-gradient(135deg, #29ABE2, #1A7BA8); color: #FFFFFF; text-decoration: none; border-radius: 14px; font-size: 16px; font-weight: 600; letter-spacing: 0.5px; box-shadow: 0 4px 24px rgba(41,171,226,0.25); }
  .note { padding: 8px 40px 32px; text-align: center; }
  .note p { color: #64748B; font-size: 12px; line-height: 1.6; margin: 0; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(41,171,226,0.2), transparent); margin: 0 40px; }
  .footer { padding: 24px 40px; text-align: center; }
  .footer p { color: #475569; font-size: 11px; margin: 0; }
</style>
</head>
<body>
<div class="outer">
<div class="container">
  <div class="logo-area">
    <img src="{{ logo_url }}" alt="Citadel" width="72" height="72" style="border-radius: 16px;" />
  </div>
  <div class="header">
    <h1>Verify Your Email</h1>
    <p>Thank you for registering with Citadel.<br/>Please verify your email address to activate your account.</p>
  </div>
  <div class="body">
    <a href="{{ verification_url }}" class="btn">Verify Email</a>
  </div>
  <div class="divider"></div>
  <div class="note">
    <p>This link will expire in 24 hours. If you did not create an account with Citadel, please ignore this email.</p>
  </div>
  <div class="footer">
    <p>&copy; 2025 Citadel Group. All rights reserved.</p>
  </div>
</div>
</div>
</body>
</html>
