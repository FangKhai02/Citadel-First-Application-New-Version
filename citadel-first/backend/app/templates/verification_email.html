<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Your Email — Citadel</title>
<style>
  body { margin: 0; padding: 0; background-color: #F1F5F9; font-family: 'Segoe UI', Arial, sans-serif; -webkit-text-size-adjust: 100%; }
  .outer { width: 100%; padding: 48px 0; background-color: #F1F5F9; }
  .container { max-width: 520px; margin: 0 auto; background-color: #FFFFFF; border-radius: 16px; border: 1px solid #E2E8F0; overflow: hidden; }
  .logo-area { padding: 36px 40px 0; text-align: center; }
  .logo-area img { width: 72px; height: 72px; }
  .header { padding: 20px 40px 0; text-align: center; }
  .header h1 { color: #0F172A; font-size: 24px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
  .header p { color: #475569; font-size: 15px; line-height: 1.6; margin: 0; }
  .body { padding: 28px 40px; text-align: center; }
  .btn { display: inline-block; padding: 14px 44px; background-color: #29ABE2; color: #FFFFFF; text-decoration: none; border-radius: 12px; font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
  .note { padding: 8px 40px 28px; text-align: center; }
  .note p { color: #64748B; font-size: 12px; line-height: 1.6; margin: 0; }
  .divider { height: 1px; background-color: #E2E8F0; margin: 0 40px; }
  .footer { padding: 20px 40px; text-align: center; }
  .footer p { color: #94A3B8; font-size: 11px; margin: 0; }
</style>
</head>
<body>
<div class="outer">
<div class="container">
  <div class="logo-area">
    <img src="{{ logo_url }}" alt="Citadel" width="72" height="72" style="border-radius: 16px;" />
  </div>
  <div class="header">
    <h1>Verify Your Email</h1>
    <p>Thank you for registering with Citadel.<br/>Please verify your email address to activate your account.</p>
  </div>
  <div class="body">
    <a href="{{ verification_url }}" class="btn">Verify Email</a>
  </div>
  <div class="divider"></div>
  <div class="note">
    <p>This link will expire in 24 hours. If you did not create an account with Citadel, please ignore this email.</p>
  </div>
  <div class="footer">
    <p>&copy; 2026 Citadel Group. All rights reserved.</p>
  </div>
</div>
</div>
</body>
</html>
