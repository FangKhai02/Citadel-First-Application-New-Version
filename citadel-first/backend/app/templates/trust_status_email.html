<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="x-apple-disable-message-reformatting">
<title>Trust Application Update — Citadel</title>
<!--[if mso]>
<noscript>
<xml>
<o:OfficeDocumentSettings>
<o:PixelsPerInch>96</o:PixelsPerInch>
</o:OfficeDocumentSettings>
</xml>
</noscript>
<![endif]-->
<style type="text/css">
  body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
  body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
</style>
</head>
<body style="margin:0; padding:0; background-color:#E8ECF1; font-family:'Segoe UI',Arial,Helvetica,sans-serif; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#E8ECF1;">
<tr>
<td align="center" style="padding:36px 16px;">

  <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px; width:100%; background-color:#FFFFFF; border-radius:8px; border:1px solid #D1D9E6; border-collapse:separate;">

    <!-- Header -->
    <tr>
      <td align="center" style="padding:28px 32px 20px; background-color:#1A3A5C; border-radius:8px 8px 0 0;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="background-color:#29ABE2; border-radius:6px;">
          <tr>
            <td style="padding:8px 14px;">
              <span style="font-family:'Segoe UI',Arial,sans-serif; font-size:11px; font-weight:600; color:#FFFFFF; letter-spacing:0.5px;">CITADEL GROUP</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Accent line -->
    <tr>
      <td style="background-color:#29ABE2; height:3px; font-size:1px; line-height:1px;">&nbsp;</td>
    </tr>

    <!-- Body -->
    <tr>
      <td style="padding:28px 32px;">
        <h2 style="margin:0 0 16px; font-family:'Segoe UI',Arial,sans-serif; font-size:20px; font-weight:700; color:#0F172A;">Trust Application Update</h2>
        <p style="margin:0 0 16px; font-family:'Segoe UI',Arial,sans-serif; font-size:15px; color:#334155; line-height:1.6;">{{ message }}</p>

        <!-- Status badge -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 20px;">
          <tr>
            <td style="padding:10px 18px; background-color:#F0F7FC; border-radius:8px; border-left:3px solid #29ABE2;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding-right:10px;">
                    <span style="font-family:'Segoe UI',Arial,sans-serif; font-size:12px; color:#64748B; text-transform:uppercase; letter-spacing:0.5px;">STATUS</span>
                  </td>
                  <td style="padding-left:10px; border-left:1px solid #D1D9E6;">
                    <span style="font-family:'Segoe UI',Arial,sans-serif; font-size:15px; font-weight:700; color:#0F172A; padding-left:10px;">{{ status_label }}</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

        {% if extra_info %}
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 16px; background-color:#FFF7ED; border-radius:10px; border:1px solid #FDBA74;">
          <tr>
            <td style="padding:12px 16px;">
              <p style="margin:0; font-family:'Segoe UI',Arial,sans-serif; font-size:13px; color:#9A3412; line-height:1.5;">{{ extra_info }}</p>
            </td>
          </tr>
        </table>
        {% endif %}

        {% if show_contact_button %}
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 8px;">
          <tr>
            <td align="center" style="padding:10px 0;">
              <a href="mailto:fangkhai.foo@citadelgroup.com.my?subject=Trust%20Application%20Enquiry" style="display:inline-block; padding:12px 28px; background-color:#29ABE2; color:#FFFFFF; text-decoration:none; border-radius:8px; font-family:'Segoe UI',Arial,sans-serif; font-size:14px; font-weight:600;">Contact Customer Support</a>
            </td>
          </tr>
        </table>
        {% endif %}

      </td>
    </tr>

    <!-- Divider -->
    <tr>
      <td style="padding:0 32px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="border-top:1px solid #E2E8F0; font-size:1px; line-height:1px;">&nbsp;</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td align="center" style="padding:16px 32px 24px;">
        <p style="margin:0; font-family:'Segoe UI',Arial,sans-serif; font-size:11px; color:#94A3B8; line-height:1.5;">&copy; 2026 Citadel Group. All rights reserved.</p>
      </td>
    </tr>

  </table>

</td>
</tr>
</table>

</body>
</html>
